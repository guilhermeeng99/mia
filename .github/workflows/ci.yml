name: CI

# Gates every push to main + every PR on the release-blocking checks
# (CLAUDE.md Post-Change Checklist): cargo test, clippy -D warnings, svelte-check.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust (test + clippy)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      - name: cargo test
        run: cargo test
      - name: cargo clippy (warnings = errors)
        run: cargo clippy --all-targets -- -D warnings

  web:
    name: Web (svelte-check + build)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: svelte-check + vite build
        run: bun run build
